<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' data:; script-src 'self' 'unsafe-eval' 'unsafe-inline';" />
  <title>Electrical Testing Suite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, Arial, sans-serif; background: #f1f5f9; overflow: hidden; }
    #root { height: 100vh; overflow: auto; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root">
    <div style="padding: 50px; text-align: center; color: #64748b; font-family: sans-serif;">
      <h2>Initializing UI...</h2>
      <p>If this message doesn't disappear, check the console for errors.</p>
    </div>
  </div>
</body>
</html>
